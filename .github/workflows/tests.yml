name: Tests and Linting

on:
  workflow_dispatch:
    inputs:
      trusted_pr_number:
        description: Pull request number for a trusted fork rerun
        required: false
        type: string
        default: ""
      trusted_head_repository:
        description: Full repository name of the PR head to test
        required: false
        type: string
        default: ""
      trusted_head_sha:
        description: Head SHA of the PR to test
        required: false
        type: string
        default: ""
  pull_request:
  push:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.trusted_pr_number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  UV_TORCH_BACKEND: "auto"
  UV_SYSTEM_PYTHON: 1
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  trusted-status-start:
    name: Trusted status start
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - uses: actions/github-script@v7
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: "${{ inputs.trusted_head_sha }}",
              state: "pending",
              context: "trusted-ci",
              description: "Trusted CI is running",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  linting:
    name: Linting
    needs: trusted-status-start
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' || inputs.trusted_head_sha == ''
        with:
          # requites to grab the history of the PR
          fetch-depth: 0

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        with:
          repository: ${{ inputs.trusted_head_repository }}
          ref: ${{ inputs.trusted_head_sha }}

      - name: Fetch trusted base branch for lint diff
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        env:
          TRUSTED_BASE_REPOSITORY: ${{ github.repository }}
          TRUSTED_BASE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TRUSTED_BASE_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid trusted base repository: $TRUSTED_BASE_REPOSITORY" >&2
            exit 1
          fi

          git check-ref-format --branch "$TRUSTED_BASE_REF" >/dev/null
          git fetch --no-tags --depth=1 "https://github.com/${TRUSTED_BASE_REPOSITORY}.git" "refs/heads/${TRUSTED_BASE_REF}:refs/remotes/trusted-base"

      - uses: actions/setup-python@v5
        with:
          cache: 'pip'

      - uses: pre-commit/action@v3.0.0
        if: github.event_name == 'pull_request'
        with:
          extra_args: --color=always --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

      - uses: pre-commit/action@v3.0.0
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        with:
          extra_args: --color=always --from-ref refs/remotes/trusted-base --to-ref HEAD

  pytest:
    name: Pytest (py${{ matrix.python-version }}, ${{ matrix.name }})
    needs: trusted-status-start
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      # noinspection YAMLSchemaValidation
      matrix: >-
        ${{
          fromJSON(
            github.event_name == 'push' &&
            '{
              "include": [
                {
                  "python-version": "3.10",
                  "name": "fast",
                  "pytest_markers": "not docs and not ml and not processing",
                  "test_docs": false
                },
                {
                  "python-version": "3.11",
                  "name": "full",
                  "pytest_markers": "",
                  "test_docs": null
                },
                {
                  "python-version": "3.12",
                  "name": "fast",
                  "pytest_markers": "not docs and not ml and not processing",
                  "test_docs": false
                },
                {
                  "python-version": "3.14",
                  "name": "fast",
                  "pytest_markers": "not docs and not ml and not processing",
                  "test_docs": false
                }
              ]
            }' ||
            '{
              "include": [
                {
                  "python-version": "3.12",
                  "name": "base",
                  "pytest_markers": "not docs and not ml and not processing",
                  "test_docs": false
                },
                {
                  "python-version": "3.12",
                  "name": "docs",
                  "pytest_markers": "docs",
                  "test_docs": true
                },
                {
                  "python-version": "3.12",
                  "name": "ml",
                  "pytest_markers": "ml and not docs and not processing",
                  "test_docs": false
                },
                {
                  "python-version": "3.12",
                  "name": "processing",
                  "pytest_markers": "processing",
                  "test_docs": false
                }
              ]
            }'
          )
        }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' || inputs.trusted_head_sha == ''

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        with:
          repository: ${{ inputs.trusted_head_repository }}
          ref: ${{ inputs.trusted_head_sha }}

      - name: Cache downloaded resources
        uses: actions/cache@v4
        with:
          path: ~/.data/
          key: resources

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin" # See 'Supported distributions' for available options
          java-version: "8"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install -e . --group dev

      - name: Run Pytest on Python ${{ matrix.python-version }} (${{ matrix.name }})
        env:
          UMLS_API_KEY: ${{ secrets.UMLS_API_KEY }}
          PYTEST_MARKERS: ${{ matrix.pytest_markers }}
          TEST_DOCS: ${{ toJSON(matrix.test_docs) }}
        run: |
          args=(-v --inline-durations)

          if [[ -n "$PYTEST_MARKERS" ]]; then
            args+=(-m "$PYTEST_MARKERS")
          fi

          if [[ "$TEST_DOCS" == "true" ]]; then
            args+=(tests/test_docs.py)
          elif [[ "$TEST_DOCS" == "false" ]]; then
            args+=(--ignore=tests/test_docs.py)
          fi

          coverage run -m pytest "${args[@]}"

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python-version }}-${{ matrix.name }}
          path: .coverage*
          if-no-files-found: ignore
          include-hidden-files: true

  coverage:
    name: Coverage
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    needs: pytest
    uses: aphp/foldedtensor/.github/workflows/coverage.yml@main
    with:
      base-branch: master
      coverage-data-pattern: coverage-data-*
      coverage-report: coverage.txt
      coverage-badge: coverage.svg
      coverage-branch: coverage

  documentation:
    name: Documentation
    needs: trusted-status-start
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    # Main docs are built in another workflow, we don't have to test them outside of PR
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    steps:
      - uses: actions/checkout@v4

      - name: Checkout trusted fork revision for docs preview
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        env:
          TRUSTED_HEAD_REPOSITORY: ${{ inputs.trusted_head_repository }}
          TRUSTED_HEAD_SHA: ${{ inputs.trusted_head_sha }}
        run: |
          set -euo pipefail

          if [[ ! "$TRUSTED_HEAD_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid trusted_head_repository: $TRUSTED_HEAD_REPOSITORY" >&2
            exit 1
          fi

          if [[ ! "$TRUSTED_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Invalid trusted_head_sha: $TRUSTED_HEAD_SHA" >&2
            exit 1
          fi

          git fetch --no-tags --depth=1 "https://github.com/${TRUSTED_HEAD_REPOSITORY}.git" "$TRUSTED_HEAD_SHA"
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install -e . --group docs

      - name: Compute docs preview metadata
        id: docs_meta
        env:
          TRUSTED_PR_NUMBER: ${{ inputs.trusted_pr_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          preview_name="${BRANCH_NAME:0:80}"
          echo "preview_name=$preview_name" >> "$GITHUB_OUTPUT"

          if [ -n "$TRUSTED_PR_NUMBER" ]; then
            echo "pr_number=$TRUSTED_PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Git
        run: |
          git config user.name ${{ github.actor }}
          git config user.email ${{ github.actor }}@users.noreply.github.com
          echo Current docs preview name: ${{ steps.docs_meta.outputs.preview_name }}

      - name: Build documentation
        run: |
          mike deploy --alias-type=copy --update-aliases ${{ steps.docs_meta.outputs.preview_name }} latest
          mike set-default ${{ steps.docs_meta.outputs.preview_name }}

      - name: Put content of gh-pages to public folder
        run: rm -rf public && mkdir public && git archive gh-pages | tar -x -C ./public/

      - name: Set up Vercel
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Create new vercel project linked to this branch
        run: vercel project add edsnlp-${{ steps.docs_meta.outputs.preview_name }} --token=$VERCEL_TOKEN

      - name: Link public folder to the (maybe) new vercel project
        run: vercel link --cwd public --project edsnlp-${{ steps.docs_meta.outputs.preview_name }} --yes --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        run: |
          set -euo pipefail
          vercel deploy public/ --yes --token=$VERCEL_TOKEN --archive=tgz --prod 2>&1 | tee vercel-deploy.log

          URL=$(sed -nE 's/^Aliased: (https:\/\/[^ ]+).*/\1/p' vercel-deploy.log | tail -n 1)
          if [[ -z "$URL" ]]; then
            URL=$(sed -nE 's/^Production: (https:\/\/[^ ]+).*/\1/p' vercel-deploy.log | tail -n 1)
          fi

          if [[ -z "$URL" ]]; then
            echo "Could not extract the Vercel deployment URL from the deploy output." >&2
            exit 1
          fi

          echo "DOCS_PREVIEW_URL=$URL" >> "$GITHUB_ENV"

      - name: Post the documentation link
        if: steps.docs_meta.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          COMMENT_BODY=$(cat <<EOF
          ## Docs preview URL

          <a href="${DOCS_PREVIEW_URL}" target="_blank" rel="noopener noreferrer">${DOCS_PREVIEW_URL}</a>
          EOF
          )
          PAYLOAD=$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')
          HEADER="Authorization: token $GITHUB_TOKEN"
          PR_COMMENTS_URL="https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.docs_meta.outputs.pr_number }}/comments"

          # Fetch existing comments to find if one from this workflow already exists
          COMMENTS=$(curl -fsS -H "$HEADER" "$PR_COMMENTS_URL")
          COMMENT_ID=$(echo "$COMMENTS" | jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("## Docs preview URL"))) | .id')

          # Check if we have a comment ID, if so, update it, otherwise create a new one
          if [[ "$COMMENT_ID" ]]; then
            # Update existing comment
            curl -fsS -X PATCH -H "$HEADER" -H "Content-Type: application/json" -d "$PAYLOAD" "https://api.github.com/repos/${{ github.repository }}/issues/comments/$COMMENT_ID"
          else
            # Post new comment
            curl -fsS -X POST -H "$HEADER" -H "Content-Type: application/json" -d "$PAYLOAD" "$PR_COMMENTS_URL"
          fi

  simple-installation:
    name: Simple installation
    needs: trusted-status-start
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' || inputs.trusted_head_sha == ''

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
        with:
          repository: ${{ inputs.trusted_head_repository }}
          ref: ${{ inputs.trusted_head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install library
        run: |
          uv pip install ".[ml]" pytest
          pytest tests/pipelines/test_pipelines.py

  trusted-status-finish:
    name: Trusted status finish
    if: always() && github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha != ''
    needs:
      - trusted-status-start
      - linting
      - pytest
      - coverage
      - documentation
      - simple-installation
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - uses: actions/github-script@v7
        env:
          LINTING_RESULT: ${{ needs.linting.result }}
          PYTEST_RESULT: ${{ needs.pytest.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          DOCUMENTATION_RESULT: ${{ needs.documentation.result }}
          SIMPLE_INSTALLATION_RESULT: ${{ needs.simple-installation.result }}
        with:
          script: |
            const results = [
              process.env.LINTING_RESULT,
              process.env.PYTEST_RESULT,
              process.env.COVERAGE_RESULT,
              process.env.DOCUMENTATION_RESULT,
              process.env.SIMPLE_INSTALLATION_RESULT,
            ];
            const hasFailure = results.some((result) => ["failure", "cancelled", "timed_out", "action_required"].includes(result));
            const state = hasFailure ? "failure" : "success";
            const description = hasFailure
              ? "Trusted CI failed"
              : "Trusted CI passed";

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: "${{ inputs.trusted_head_sha }}",
              state,
              context: "trusted-ci",
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
