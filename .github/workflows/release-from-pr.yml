name: Create GitHub Release From Release PR

on:
  pull_request:
    types: [closed]

jobs:
  publish-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Create or update GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr.head.ref;
            const match = headRef.match(/^release\/v(\d+\.\d+\.\d+)$/);
            if (!match) {
              core.setFailed(`Unsupported release branch name: ${headRef}`);
              return;
            }

            const version = match[1];
            const tag = `v${version}`;
            const body = pr.body || "";
            const startMarker = "<!-- release-message:start -->";
            const endMarker = "<!-- release-message:end -->";
            const targetCommitish = pr.merge_commit_sha;

            if (!targetCommitish) {
              core.setFailed("Missing merge_commit_sha on the merged PR.");
              return;
            }

            let releaseBody = "";
            const startIndex = body.indexOf(startMarker);
            const endIndex = body.indexOf(endMarker);

            if (startIndex !== -1 && endIndex !== -1 && endIndex > startIndex) {
              releaseBody = body.slice(startIndex + startMarker.length, endIndex).trim();
            } else if (body.includes("## Changelog")) {
              releaseBody = body.trim();
            } else {
              core.setFailed("Could not find a release message in the merged PR body.");
              return;
            }

            let existingRelease = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              existingRelease = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const createPayload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: releaseBody,
              target_commitish: targetCommitish,
              draft: false,
              prerelease: false,
              generate_release_notes: false,
            };

            if (existingRelease) {
              await github.rest.repos.updateRelease({
                release_id: existingRelease.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: tag,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
              return;
            }

            await github.rest.repos.createRelease(createPayload);
